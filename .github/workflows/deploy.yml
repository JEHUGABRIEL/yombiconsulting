name: CI — E-Bia Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint API Gateway
        working-directory: ebia-backend/api-gateway
        run: |
          npm install --omit=dev
          node --check src/index.js
          node --check src/routes/auth.js
          node --check src/routes/tracks.js
          node --check src/routes/artists.js
          node --check src/routes/payments.js

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint Audio Service
        run: |
          pip install ruff --quiet
          ruff check ebia-backend/audio-service/src/ --select E,W,F --ignore E501

      - name: Validate docker-compose
        working-directory: ebia-backend
        run: |
          docker compose config --quiet
          echo "docker-compose.yml valide"

      - name: Verify .env not committed
        run: |
          if [ -f ebia-backend/.env ]; then
            echo "ERREUR : .env ne doit pas être commité !"
            exit 1
          fi
          echo ".env absent du repo"
